<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f8f5ee">
    <meta
      name="description"
      content="로그인 없이 바로 시작하는 한국어 타자 검정 사이트"
    >
    <title>서우타자 | 한국어 타자 검정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar" aria-label="사이트 정보">
        <a class="brand" href="/" aria-label="서우타자 홈">
          <span class="brand-mark">ㅅ</span>
          <span>
            <strong>서우타자</strong>
            <small>typing studio</small>
          </span>
        </a>
        <div class="status-pill" aria-label="계정 상태">
          <span></span>
          로그인 없음
        </div>
      </header>

      <section class="workspace" aria-label="타자 검정">
        <div class="control-strip" aria-label="검정 설정">
          <div class="field">
            <label for="categorySelect">글감</label>
            <select id="categorySelect">
              <option value="daily">일상 문장</option>
              <option value="focus">집중 문장</option>
              <option value="tech">기술 문장</option>
              <option value="mixed">섞어서</option>
            </select>
          </div>

          <div class="field">
            <span class="label">시간</span>
            <div class="segmented" role="group" aria-label="검정 시간">
              <button class="time-option is-active" type="button" data-duration="30">30초</button>
              <button class="time-option" type="button" data-duration="60">60초</button>
              <button class="time-option" type="button" data-duration="120">120초</button>
            </div>
          </div>

          <button class="ghost-button" id="newTextButton" type="button">새 글감</button>
        </div>

        <section class="exam-panel" aria-label="입력 영역">
          <div class="meter-row" aria-label="진행 상태">
            <div>
              <span class="eyebrow">남은 시간</span>
              <strong id="timeLeft">30</strong>
            </div>
            <div class="progress-track" aria-hidden="true">
              <span id="progressBar"></span>
            </div>
            <div>
              <span class="eyebrow">진행률</span>
              <strong id="progressText">0%</strong>
            </div>
          </div>

          <div class="target-text" id="targetText" aria-label="따라 칠 문장"></div>

          <label class="input-label" for="typingInput">입력</label>
          <textarea
            id="typingInput"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            rows="5"
            placeholder="여기에 입력"
          ></textarea>

          <div class="action-row">
            <button class="primary-button" id="restartButton" type="button">다시 시작</button>
            <button class="secondary-button" id="finishButton" type="button">결과 보기</button>
          </div>
        </section>

        <aside class="stats-panel" aria-label="실시간 결과">
          <div class="stat-card accent-ink">
            <span>타수</span>
            <strong id="cpmStat">0</strong>
            <small>타/분</small>
          </div>
          <div class="stat-card accent-green">
            <span>정확도</span>
            <strong id="accuracyStat">100</strong>
            <small>%</small>
          </div>
          <div class="stat-card accent-red">
            <span>오타</span>
            <strong id="mistakeStat">0</strong>
            <small>자</small>
          </div>
          <div class="stat-card accent-blue">
            <span>최고 기록</span>
            <strong id="bestStat">0</strong>
            <small>타/분</small>
          </div>
        </aside>
      </section>

      <section class="result-panel" id="resultPanel" aria-live="polite" hidden>
        <div>
          <span class="eyebrow">이번 결과</span>
          <h1 id="resultTitle">좋은 시작이에요</h1>
        </div>
        <dl class="result-grid">
          <div>
            <dt>타수</dt>
            <dd><span id="resultCpm">0</span><small>타/분</small></dd>
          </div>
          <div>
            <dt>정확도</dt>
            <dd><span id="resultAccuracy">100</span><small>%</small></dd>
          </div>
          <div>
            <dt>오타</dt>
            <dd><span id="resultMistakes">0</span><small>자</small></dd>
          </div>
          <div>
            <dt>입력</dt>
            <dd><span id="resultTyped">0</span><small>자</small></dd>
          </div>
        </dl>
      </section>

      <section class="history-panel" aria-label="최근 기록">
        <div class="section-heading">
          <span class="eyebrow">최근 기록</span>
          <button class="text-button" id="clearHistoryButton" type="button">기록 지우기</button>
        </div>
        <ol class="history-list" id="historyList"></ol>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
